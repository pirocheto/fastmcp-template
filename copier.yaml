project_name:
  type: str
  help: What is your project name?
  default: my-awesome-project

project_description:
  type: str
  help: A short description of your project.
  default: Add your description here

python_version:
  type: str
  help: The minimum Python version required for your project.
  default: "3.14"

_exclude:
  - "copier.yaml"
  - "copier.yml"
  - "~*"
  - "*.py[co]"
  - "__pycache__"
  - ".git"
  - ".DS_Store"
  - ".svn"
  - ".venv/"
